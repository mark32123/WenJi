name: CI/CD Pipeline # 工作流名称

# 1. 触发条件：当推送到 main 分支或发起 PR 时触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. 定义任务
jobs:
  build-and-test:
    runs-on: ubuntu-latest # 运行环境：最新的 Ubuntu 系统

    steps:
      # 步骤 1: 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤 2: 设置环境 (以 Node.js 为例)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 指定版本

      # 步骤 3: 安装依赖
      - name: Install Dependencies
        run: npm install

      # 步骤 4: 运行测试 (确保代码没报错)
      - name: Run Tests
        run: npm test

      # 步骤 5: 构建项目
      - name: Build
        run: npm run build


        deploy:
          name: Deploy to Server
          needs: build-and-test # 依赖上面的任务，只有测试通过才执行
          if: github.ref == 'refs/heads/main' # 仅当推送到 main 分支时部署

          runs-on: ubuntu-latest
          steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                  cd /path/to/your/project
                  git pull origin main
                  npm install
                  pm2 restart your-app-name