name: Java CI with Maven

# 触发条件：当你 push 代码到 main/master 分支，或者提交 Pull Request 时自动运行
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # 在 GitHub 提供的最新 Linux 环境中运行

    steps:
      # 1. 检出你的代码
      - uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # 开启 Maven 缓存，第二次运行会快很多

      # 3. 执行 Maven 构建命令
      # 这里的命令是：清理旧包 -> 编译代码 -> 运行测试 (如果有) -> 打包
      # 如果你现在不想跑测试（怕报错），可以把 'test' 去掉，只留 'package'
      - name: Build with Maven
        run: mvn clean package -DskipTests
        # 解释：-DskipTests 是为了先让你体验成功的感觉，跳过单元测试。
        # 等你以后写了测试，再去掉这个参数。

      # 4.上传构建好的 jar 包，方便下载检查
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-${{ github.run_number }} # 这样每次构建名字都不一样，比如 my-app-1, my-app-2
          path: target/*.jar