spring:
  data:
    redis:
      port: 6379
      host: 192.168.100.128
      password: 123321
      # 连接池配置
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接数
          min-idle: 0        # 最小空闲连接数
          max-wait: -1ms     # 最大等待时间
      # 超时配置
      timeout: 3000ms        # 连接超时时间
      # 数据库索引
      database: 3
  datasource:
    url: jdbc:mysql://localhost:3306/wenji?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen-max
          temperature: 0.8
          max-tokens: 200

logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
    com.example.ai: debug
    com.baomidou.mybatisplus: debug

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: 
      table-underline: true
  mapper-locations: classpath*:com/example/Mapper/*.xml
  type-aliases-package: com.example.Pojo

# JWT 配置
jwt:
  secret: "wenji-jwt-secret-key-at-least-32-characters-long-for-security-2024"
