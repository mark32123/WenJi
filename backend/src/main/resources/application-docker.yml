spring:
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  data:
    redis:
      host: ${SPRING_REDIS_HOST:wenji-redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:123321}
      database: 3
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 2000ms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/wenji?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen-max
          temperature: 0.8
          max-tokens: 200

logging:
  level:
    org.springframework.ai.chat.client.advisor: info
    com.example.ai: info
    com.baomidou.mybatisplus: info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  mapper-locations: classpath*:com/example/Mapper/*.xml
  type-aliases-package: com.example.Pojo

jwt:
  secret: "wenji-jwt-secret-key-at-least-32-characters-long-for-security-2024"

file:
  upload-path: /app/uploads/
  access-url: /uploads/
